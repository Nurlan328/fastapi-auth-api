services:
  db:
    image: postgres:16
    container_name: fastapi_auth_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      # host:container. We use 5433 on the host because 5432 is already taken
      # by another local Postgres. Inside the container it is still 5432.
      - "5433:5432"
    volumes:
      # data persists across container restarts
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    container_name: fastapi_auth_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fastapi_auth_rabbitmq
    ports:
      - "5672:5672"      # AMQP — the app and the worker connect here
      - "15672:15672"    # management UI: http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
